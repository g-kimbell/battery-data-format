name: Docs Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BDF_CACHE_DIR: ${{ github.workspace }}/.bdf-cache
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Compute content-addressed cache key (offline)
        id: key
        run: echo "k=bdf-data-$(uv run python scripts/warm_cache.py --emit-key)" >> "$GITHUB_OUTPUT"
      - name: Restore/save warmed cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bdf-cache
          key: ${{ steps.key.outputs.k }}
      - name: Warm cache
        run: uv run python scripts/warm_cache.py
      - name: Build docs
        env:
          MPLBACKEND: Agg
        run: uv run --all-extras sphinx-build -b html docs docs/_build/html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
