name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pre-commit: # Only required while repo is private
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
      - uses: pre-commit-ci/lite-action@v1.1.0
        if: always()

  build:
    runs-on: ubuntu-latest
    env:
      BDF_CACHE_DIR: ${{ github.workspace }}/.bdf-cache
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Check generated docs are in sync with ontology snapshot
        run: uv run python scripts/generate_docs.py --check
      - name: Compute content-addressed cache key (offline)
        id: key
        run: echo "k=bdf-data-$(uv run python scripts/warm_cache.py --emit-key)" >> "$GITHUB_OUTPUT"
      - name: Restore/save warmed cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bdf-cache
          key: ${{ steps.key.outputs.k }}
      - name: Warm cache
        run: uv run python scripts/warm_cache.py
      - name: Build docs (link check skipped)
        env:
          MPLBACKEND: Agg
        run: uv run --all-extras sphinx-build -b html docs docs/_build/html
      - name: Build package and twine check
        run: |
          uv build
          uvx twine check dist/*

  offline-tests:
    needs: pre-commit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests (offline)
        run: uv run --all-extras pytest -q -m "not network"

  warm-cache:
    needs: offline-tests
    runs-on: ubuntu-latest
    env:
      BDF_CACHE_DIR: ${{ github.workspace }}/.bdf-cache
    outputs:
      cache-key: ${{ steps.key.outputs.k }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Compute content-addressed cache key (offline)
        id: key
        run: echo "k=bdf-data-$(uv run python scripts/warm_cache.py --emit-key)" >> "$GITHUB_OUTPUT"
      - name: Restore warmed cache
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.bdf-cache
          key: ${{ steps.key.outputs.k }}
      - name: Warm cache
        run: uv run python scripts/warm_cache.py
      - name: Save warmed cache
        if: success() && steps.restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.bdf-cache
          key: ${{ steps.key.outputs.k }}

  network-tests:
    needs: warm-cache
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      MPLBACKEND: Agg
      BDF_CACHE_DIR: ${{ github.workspace }}/.bdf-cache
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Restore warmed cache (restore-only)
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.bdf-cache
          key: ${{ needs.warm-cache.outputs.cache-key }}
      - name: Run tests (network, cache-backed sockets blocked)
        run: uv run --all-extras pytest -q -m network --block-cached-sockets
